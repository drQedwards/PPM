name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-mcp:
    name: Publish MCP Server to Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify mcpName in package.json
        run: |
          MCP_NAME=$(node -e "console.log(require('./package.json').mcpName || '')")
          if [ -z "$MCP_NAME" ]; then
            echo "Error: mcpName not found in package.json"
            exit 1
          fi
          echo "mcpName: $MCP_NAME"
          echo "version: $(node -e "console.log(require('./package.json').version)")"

      - name: Install mcp-publisher
        working-directory: .  # mcp-publisher installs globally from repo root
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --help

      - name: Publish to MCP Registry
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        run: |
          if [ -z "$MCP_REGISTRY_TOKEN" ]; then
            echo "MCP_REGISTRY_TOKEN not set; skipping MCP Registry publish."
            exit 0
          fi
          mcp-publisher publish
